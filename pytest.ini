# Pytest configuration for the hawki test suite.
#
# Plain default discovery over the tests/ tree. The suite mixes
# unittest.TestCase classes and plain pytest functions; both are collected by
# the default rules below. All external services (Docker, LLM, network) are
# mocked in the tests themselves, so no live-service markers are needed.
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra
filterwarnings =
    ignore::DeprecationWarning
